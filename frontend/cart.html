<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Корзина</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">AutoParts</div>
            <div id="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="cart.html" style="color: var(--primary);">Корзина</a>
            </div>
            <div id="nav-auth"></div>
        </nav>
    </header>

    <main>
        <h1>Ваша корзина</h1>
        <div id="cart-empty-message" style="display:none;">Корзина пуста. <a href="catalog.html">В каталог?</a></div>
        
        <!-- Таблица товаров -->
        <table id="cart-table">
            <thead>
                <tr>
                    <th>Товар</th>
                    <th>Цена</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody id="cart-body"></tbody>
        </table>

        <!-- Итого -->
        <div class="cart-summary" style="margin-top: 20px; text-align: right;">
            <h3>Итого: <span id="total-price">0</span> ₽</h3>
            <button onclick="checkout()" style="padding: 15px 30px; font-size: 1.2rem;">Оформить заказ</button>
            <button onclick="clearCart()" style="background: #d32f2f;">Очистить</button>
        </div>
        <!-- Модальное окно подтверждения данных -->
<div id="confirmModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; overflow-y: auto;">
    <div style="background:white; max-width:500px; margin:50px auto; padding:30px; border-radius:10px; box-shadow: 0 5px 25px rgba(0,0,0,0.2);">
        <h2 style="margin-top:0;">Проверка данных заказа</h2>
        <p style="color:#666; font-size:0.9rem;">Пожалуйста, проверьте контактную информацию для доставки.</p>
        
        <form id="confirmOrderForm">
            <div style="margin-bottom:15px;">
                <label>Телефон (обязательно):</label>
                <input type="text" id="check-phone" required placeholder="+7 (___) ___-__-__">
            </div>
            <div style="margin-bottom:15px;">
                <label>Email (обязательно):</label>
                <input type="email" id="check-email" required placeholder="example@mail.ru">
            </div>
            <div style="margin-bottom:15px;">
                <label>Адрес доставки:</label>
                <input type="text" id="check-address" required placeholder="Город, улица, дом, квартира">
            </div>
            
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button type="submit" style="flex:2; background:#28a745;">Подтвердить и оформить</button>
                <button type="button" onclick="closeConfirmModal()" style="flex:1; background:#888;">Отмена</button>
            </div>
        </form>
    </div>
</div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        // Скрипт корзины прямо здесь
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const tbody = document.getElementById('cart-body');
            const totalSpan = document.getElementById('total-price');
            const table = document.getElementById('cart-table');
            const emptyMsg = document.getElementById('cart-empty-message');

            tbody.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                table.style.display = 'none';
                emptyMsg.style.display = 'block';
                totalSpan.innerText = 0;
                return;
            }

            table.style.display = 'table';
            emptyMsg.style.display = 'none';

            cart.forEach((item, index) => {
                total += item.price;
                tbody.innerHTML += `
                    <tr>
                        <td>${item.name} (${item.brand})</td>
                        <td>${item.price} ₽</td>
                        <td><button onclick="removeFromCart(${index})" style="background:#888; font-size:0.8rem;">Удалить</button></td>
                    </tr>
                `;
            });

            totalSpan.innerText = total;
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1); 
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function clearCart() {
            localStorage.removeItem('cart');
            renderCart();
        }

        // Функция, которая вызывается первой при нажатии "Оформить заказ"
async function checkout() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));

    if (!currentUser) {
        alert("Для оформления заказа необходимо войти в аккаунт");
        window.location.href = 'login.html';
        return;
    }

    if (cart.length === 0) return alert("Ваша корзина пуста!");

    // 1. Загружаем текущие данные профиля для проверки
    try {
        const response = await fetch(`/api/my-profile/${currentUser.login}`);
        const profile = await response.json();

        // 2. Предзаполняем форму в модальном окне
        document.getElementById('check-phone').value = profile.phone || "";
        document.getElementById('check-email').value = profile.email || "";
        document.getElementById('check-address').value = profile.address || "";

        // 3. Показываем окно
        document.getElementById('confirmModal').style.display = 'block';
    } catch (e) {
        alert("Ошибка при получении данных профиля");
    }
}

function closeConfirmModal() {
    document.getElementById('confirmModal').style.display = 'none';
}

// Финальная отправка заказа после подтверждения формы
document.getElementById('confirmOrderForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));

    // Группировка товаров
    const groupedItems = {};
    cart.forEach(item => {
        if (groupedItems[item.id]) {
            groupedItems[item.id].quantity += 1;
        } else {
            groupedItems[item.id] = { id: parseInt(item.id), quantity: 1 };
        }
    });

    const payload = {
        username: currentUser.login,
        items: Object.values(groupedItems),
        phone: document.getElementById('check-phone').value,
        email: document.getElementById('check-email').value,
        address: document.getElementById('check-address').value
    };

    try {
        const response = await fetch('/api/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (response.ok) {
            alert(`Заказ №${result.order_id} успешно оформлен!`);
            localStorage.removeItem('cart');
            window.location.href = 'profile.html';
        } else {
            alert("Ошибка: " + result.detail);
        }
    } catch (err) {
        alert("Ошибка соединения с сервером");
    }
});

        
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
