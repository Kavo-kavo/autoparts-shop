<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление заказами - CRM</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .status-select { padding: 5px; border-radius: 4px; font-weight: bold; }
        .status-New { color: #007bff; }
        .status-Processing { color: #f57c00; }
        .status-Completed { color: #28a745; }
        .status-Canceled { color: #d32f2f; }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">CRM Заказы</div>
            <a href="admin.html">Назад в Админку</a>
        </nav>
    </header>

    <main>
        <h1>Все заказы системы</h1>
        
        <table class="admin-table">
            <thead>
                <tr>
                    <th>№</th>
                    <th>Дата</th>
                    <th>Клиент</th>
                    <th>Сумма</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                <!-- Сюда JS вставит строки -->
            </tbody>
        </table>
    </main>

    <script src="js/auth.js"></script>
    <script>
        async function loadAllOrders() {
            const response = await fetch('/api/admin/orders');
            const orders = await response.json();
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '';

            orders.forEach(o => {
                tbody.innerHTML += `
                    <tr>
                    
                        <td>${o.id}</td>
                        <td>${o.date}</td>
                        <td>
                            <b>${o.customer_name}</b><br>
                            <small>📞 ${o.customer_phone}</small><br>
                            <small>🚗 ${o.customer_car || 'Авто не указано'}</small>
                        </td>
                        <td>${o.total_price} ₽</td>
                        <td>
                            <select onchange="updateStatus(${o.id}, this.value)" class="status-select status-${o.status}">
                                <option value="Новый" ${o.status === 'Новый' ? 'selected' : ''}>Новый</option>
                                <option value="В обработке" ${o.status === 'В обработке' ? 'selected' : ''}>В обработке</option>
                                <option value="Оплачен" ${o.status === 'Оплачен' ? 'selected' : ''}>Оплачен</option>
                                <option value="Доставлен" ${o.status === 'Доставлен' ? 'selected' : ''}>Доставлен</option>
                                <option value="Отменен" ${o.status === 'Отменен' ? 'selected' : ''}>Отменен</option>
                            </select>
                        </td>
                        <td>
                            <button onclick="showOrderDetails(${o.id})">👁️ Состав</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function updateStatus(orderId, newStatus) {
            try {
                const response = await fetch(`/api/admin/orders/${orderId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (response.ok) {
                    console.log("Статус обновлен");
                    loadAllOrders(); // Перерисовываем для обновления стилей
                }
            } catch (e) {
                alert("Ошибка связи с сервером");
            }
        }

        document.addEventListener('DOMContentLoaded', loadAllOrders);

        // Функция для загрузки и показа состава заказа
async function showOrderDetails(orderId) {
    const modal = document.getElementById('orderModal');
    const orderIdSpan = document.getElementById('modalOrderId');
    const tbody = document.getElementById('modalItemsTableBody');

    orderIdSpan.innerText = orderId;
    tbody.innerHTML = '<tr><td colspan="3">Загрузка данных...</td></tr>';
    modal.style.display = 'block';

    try {
        // Используем твой существующий эндпоинт
        const response = await fetch(`/api/orders/${orderId}/items`);
        const items = await response.json();

        tbody.innerHTML = '';
        if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3">В этом заказе нет товаров</td></tr>';
        } else {
            items.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.brand} ${item.name}</td>
                        <td>${item.quantity} шт.</td>
                        <td>${item.price} ₽</td>
                    </tr>
                `;
            });
        }
    } catch (error) {
        console.error("Ошибка загрузки состава заказа:", error);
        tbody.innerHTML = '<tr><td colspan="3" style="color:red;">Ошибка при загрузке данных</td></tr>';
    }
}

// Функция закрытия окна
function closeModal() {
    document.getElementById('orderModal').style.display = 'none';
}

// Закрытие окна при клике вне его области
window.onclick = function(event) {
    const modal = document.getElementById('orderModal');
    if (event.target == modal) {
        closeModal();
    }
}
        
    </script>
    <div id="orderModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000;">
    <div style="background:white; max-width:600px; margin:10% auto; padding:20px; border-radius:8px; position: relative;">
        <span onclick="closeModal()" style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:1.5rem;">&times;</span>
        <h3>Состав заказа №<span id="modalOrderId"></span></h3>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Товар</th>
                    <th>Кол-во</th>
                    <th>Цена</th>
                </tr>
            </thead>
            <tbody id="modalItemsTableBody">
                <!-- Сюда JS вставит товары -->
            </tbody>
        </table>
        <button onclick="closeModal()" style="margin-top:20px; background:#333; color: white; width: auto; padding: 10px 20px;">Закрыть</button>
    </div>
</div>
</body>
</html>
